dataset:
  base_dir: "/Volumes/dataserver_files/Group_Bausch/Tom_Dataserver/20260226"
  dataset_id: "AMF_092_002__C640_C470"
  variation: ""
  sampling: 1
  tstop: -1
  xy_cut: 0.0
  z_lower: 0
  z_upper: null
  load_mask_channel: true

beads:
  enabled: false
  plot_preview_enabled: true
  channel_to_use: 1
  min_size_voxels: 5
  max_bbox_ratio: 6.0
  max_inertia_ratio: 6.0
  search_range_um: 10.0
  adaptive_stop_px: 1.0
  adaptive_step: 0.95
  memory: 1
  min_track_length: 2
  threshold_samples: 10
  compute_angular_speed: false
  render_displacement_overlay_movie: true
  plot_velocity_over_time: true
  displacement_overlay_frame_step: 1
  displacement_overlay_fps: 10
  displacement_overlay_vector_scale: 2.0
  displacement_overlay_max_vectors: 3000
  displacement_overlay_dpi: 150
  displacement_overlay_show_title: true
  origin_x_um: null
  origin_y_um: null

autocorr:
  enabled: false
  single_frame_3d_enabled: true
  sampled_3d_enabled: true
  sampled_2d_enabled: false
  radial_2d_enabled: false
  channel_3d: 0
  single_frame_3d: 0
  sample_count_3d: 10
  sample_count_2d: 0
  parallel_workers: 0
  middle_z_for_2d: "middle"
  frame_2d: 0
  channel_2d: 0
  nbins: 120
  subtract_mean: true
  fft_mode: circular
  fit_mode: weighted_near0  # or weighted_near0
  normalize: "var2"
  plot_r_um_min: 1
  plot_r_um_max: 25
  fit_r_um_min: null
  fit_r_um_max: null

vector_corr:
  enabled: false
  use_unit_vectors: false
  plot_temporal_enabled: true
  plot_spatial_enabled: true
  plot_tensor_enabled: true
  plot_tensor_parts:
    - full
    - symmetric
    - antisymmetric
  velocity_source: drift_corrected
  exclude_velocity_outliers: true
  velocity_outlier_method: westerweel_scarano
  velocity_outlier_neighbor_count: 7
  velocity_outlier_min_neighbors: 4
  velocity_outlier_threshold: 2.0
  multi_frame_average: true
  multi_frame_count: 20
  temporal_max_lag_frames: 100
  temporal_plot_max_points: 1000
  temporal_plot_lag_s_min: null
  temporal_plot_lag_s_max: null
  temporal_fit_lag_s_min: 100
  temporal_fit_lag_s_max: null
  spatial_nbins: 200
  spatial_frame_index: 90
  spatial_max_radius_um: null
  spatial_plot_distance_um_min: null
  spatial_plot_distance_um_max: null
  tensor_enabled: false
  tensor_bases:
    - cartesian
    - spherical
  tensor_frame_index: 90
  tensor_use_unit_vectors: true
  tensor_distance_mode: xy
  tensor_nbins: 80
  tensor_max_radius_um: null
  tensor_plot_distance_um_min: 0
  tensor_plot_distance_um_max: null
  tensor_fit_enabled: true
  tensor_fit_parts:
    - antisymmetric
    - symmetric
  tensor_fit_component_pairs_by_part:
    antisymmetric: [zx, xy, yz]
    symmetric: [xx, yy, zz]
  tensor_fit_distance_um_min: 5
  tensor_fit_distance_um_max: 200
  tensor_fit_min_points: 4
  plot_tensor_pair_fits_enabled: true
  plot_tensor_time_series_enabled: true
  tensor_time_series_enabled: false
  tensor_time_series_sample_count: 5
  parallel_workers: 0

velocity_spectrum:
  enabled: true
  velocity_source: drift_corrected
  grid_shape: [32, 32, 32]
  box_padding_fraction: 0.05
  k_bins: 64
  apply_window: true
  window_function: hann
  plot_smoothing_bins: 5
  subtract_mean: false # is already done with drift correction
  plot_enabled: false
  plot_k_min: null
  plot_k_max: null
  xy_vorticity:
    enabled: false
    frame: middle
    grid_shape: [64, 64]
    box_padding_fraction: 0.05
    interpolation_method: linear
    quiver_stride: 3
    quiver_scale: null
    plot_enabled: true
    colormap: RdBu_r
    spectrum:
      enabled: true
      k_bins: 64
      subtract_mean: false
      apply_window: true
      window_function: hann
      plot_enabled: true
      plot_k_min: null
      plot_k_max: null

image_corr:
  enabled: false
  channel: 0
  middle_z_for_2d: "middle"
  frame_step: 1
  lag_step: 1
  max_lag_frames: null

runtime:
  skip_existing: true
  save_preview_masks: false
  verbose: true

